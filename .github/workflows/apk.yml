name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download code
        run: |
          curl -L -o code.zip "https://cnxh2ncxrj4tc.ok.kimi.link/MetroNative-v2.0.zip"
          unzip -q code.zip

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      - name: Install deps
        run: |
          cd MetroNative
          npm install --legacy-peer-deps --no-audit --no-fund 2>&1

      - name: Build APK
        run: |
          cd MetroNative/android
          gradle assembleRelease --no-daemon --max-workers=2 2>&1

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: MetroNative/android/app/build/outputs/apk/release/*.apk
