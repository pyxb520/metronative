name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download source code
        run: |
          curl -L -o metronative.zip "https://cnxh2ncxrj4tc.ok.kimi.link/MetroNative-v2.0.zip"
          unzip -q metronative.zip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./MetroNative
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build Release APK
        working-directory: ./MetroNative/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --max-workers=2

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: MetroNative/android/app/build/outputs/apk/release/*.apk
          retention-days: 7
